<!DOCTYPE html>
<html>

<head>
    <title>Studio OS - Copilot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: rgba(255, 255, 255, 0.05);
            --surface-hover: rgba(255, 255, 255, 0.08);
            --accent: #40DCA5;
            --accent-glow: rgba(64, 220, 165, 0.2);
            --blue: #5da9ff;
            --purple: #8b5cf6;
            --orange: #f59e0b;
            --text-main: #f3f4f6;
            --text-dim: #9ca3af;
            --border: rgba(255, 255, 255, 0.1);
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        body {
            width: 340px;
            background: linear-gradient(135deg, #050505 0%, #0a0a0a 100%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            border-radius: 12px;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, var(--accent-glow) 0%, transparent 60%);
            opacity: 0.1;
            z-index: -1;
            animation: drift 20s linear infinite;
        }

        @keyframes drift {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .section {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            animation: slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section:nth-child(2) {
            animation-delay: 0.1s;
        }

        .section:nth-child(3) {
            animation-delay: 0.2s;
        }

        .section:nth-child(4) {
            animation-delay: 0.3s;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 600;
            margin: 0;
            letter-spacing: 1px;
            color: var(--text-main);
            text-transform: uppercase;
        }

        .status-orb {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .status-orb.offline {
            background: var(--error);
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.2);
        }

        .section {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            display: block;
        }

        input,
        select,
        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            color: #fff;
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 13px;
            outline: none;
        }

        input:focus,
        textarea:focus {
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.5);
        }

        button {
            width: 100%;
            background: var(--accent);
            color: #050505;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            margin-top: 4px;
        }

        .btn-secondary:hover {
            background: var(--surface-hover);
            border-color: var(--blue);
            color: var(--blue);
        }

        .btn-audit {
            border-color: var(--orange);
            color: var(--orange);
        }

        .btn-audit:hover {
            border-color: var(--orange);
            color: #000;
            background: var(--orange);
        }

        .btn-research {
            border-color: var(--purple);
            color: var(--purple);
        }

        .btn-research:hover {
            border-color: var(--purple);
            color: #fff;
            background: var(--purple);
        }

        .status-bar {
            font-size: 11px;
            color: var(--text-dim);
            text-align: center;
            padding: 8px;
            border-top: 1px solid var(--border);
            margin-top: 10px;
        }

        .decision-card {
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid var(--accent);
            padding: 12px;
            border-radius: 0 8px 8px 0;
            margin-top: 12px;
        }

        .decision-question {
            font-size: 13px;
            line-height: 1.5;
            display: block;
            margin-bottom: 12px;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        .btn-group button {
            padding: 8px;
            font-size: 11px;
        }

        .activity-feed {
            max-height: 150px;
            overflow-y: auto;
            font-size: 12px;
            padding-right: 4px;
        }

        .activity-feed::-webkit-scrollbar {
            width: 4px;
        }

        .activity-feed::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .activity-item {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            color: var(--text-dim);
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-item b {
            color: var(--text-main);
        }

        .mission-glow {
            animation: missionPulse 4s infinite;
        }

        @keyframes missionPulse {
            0% {
                border-color: var(--border);
                box-shadow: 0 0 0 rgba(93, 169, 255, 0);
            }

            50% {
                border-color: var(--blue);
                box-shadow: 0 0 15px rgba(93, 169, 255, 0.2);
            }

            100% {
                border-color: var(--border);
                box-shadow: 0 0 0 rgba(93, 169, 255, 0);
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Studio Copilot</h1>
        <div id="connection_orb" class="status-orb"></div>
    </div>

    <div class="section mission-glow" style="border-bottom: 2px solid var(--blue);">
        <span class="section-title">Active Mission</span>
        <input type="text" id="focus_input" placeholder="Define current focus...">
        <button id="btn_update_focus" class="btn-secondary" style="margin-top: 0;">SET MISSION</button>
    </div>

    <div class="section">
        <span class="section-title">Signal Capture</span>
        <select id="pattern">
            <option value="felt_wrong">"Something feels off"</option>
            <option value="strategic_pivot">Strategic Pivot</option>
            <option value="rushed_release">Rushed Release</option>
            <option value="bottleneck">System Bottleneck</option>
        </select>
        <textarea id="note" placeholder="Describe the realization..." rows="2"></textarea>
        <button id="capture">CAPTURE SIGNAL</button>
    </div>

    <div class="section">
        <span class="section-title">Autonomous Control</span>
        <input type="text" id="research_topic" placeholder="Deep Research Topic...">
        <div style="display: flex; gap: 8px; margin-top: 8px;">
            <button id="btn_research" class="btn-secondary btn-research">RESEARCH</button>
            <button id="btn_audit" class="btn-secondary btn-audit">AUDIT</button>
        </div>
    </div>

    <div class="section">
        <span class="section-title">Agent Stack</span>
        <div id="agent_presence" class="activity-feed">
            <div class="activity-item"><em>Syncing with Sovereign...</em></div>
        </div>
    </div>

    <div class="status-bar" id="status">Ready for input</div>

    <script src="popup.js"></script>
</body>

</html>
