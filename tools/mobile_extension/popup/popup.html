<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio OS Copilot</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Studio OS Copilot</h1>
            <p class="subtitle">Decision Stream</p>
        </header>

        <main id="decision-stream">
            <div class="loader">Loading decisions...</div>
        </main>

        <footer>
            <div class="status-indicator">
                <span class="dot pulse"></span>
                Connected to Studio OS
            </div>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>

</html>
