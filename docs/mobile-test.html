<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio Mobile</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --text-color: #e0e0e0;
            --accent-color: #3b82f6;
            --card-bg: #1a1a1a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #header {
            padding: 16px;
            background: rgba(13, 13, 13, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #333;
            text-align: center;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 16px;
            animation: fadeIn 0.3s ease;
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--accent-color);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot-message {
            align-self: flex-start;
            background-color: var(--card-bg);
            border-bottom-left-radius: 4px;
            border: 1px solid #333;
        }

        .status-message {
            align-self: center;
            font-size: 12px;
            color: #666;
            margin: 4px 0;
            font-style: italic;
        }

        .citation {
            font-size: 12px;
            color: #888;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #444;
        }

        #input-area {
            padding: 16px;
            background: var(--bg-color);
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border-radius: 24px;
            border: 1px solid #444;
            background: #222;
            color: white;
            font-size: 16px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        button {
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div id="header">The Project Studio</div>
    <div id="chat-container">
        <div class="message bot-message">
            Hello! I am the Frontier Team. How can we help you build today?
        </div>
    </div>
    <div id="input-area">
        <input type="text" id="messageInput" placeholder="Ask the team..." autocomplete="off">
        <button onclick="sendMessage()">➤</button>
    </div>

    <script>
        // Determine WebSocket URL automatically based on current host
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/ws/chat`;

        let socket;

        function connect() {
            socket = new WebSocket(wsUrl);

            socket.onopen = () => {
                console.log("Connected to Studio Server");
            };

            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleServerMessage(data);
            };

            socket.onclose = () => {
                console.log("Disconnected. Reconnecting...");
                setTimeout(connect, 2000);
            };
        }

        function handleServerMessage(data) {
            const container = document.getElementById('chat-container');

            if (data.type === 'status' || data.type === 'thought') {
                const statusDiv = document.createElement('div');
                statusDiv.className = 'status-message';
                statusDiv.textContent = data.content;
                container.appendChild(statusDiv);
            } else if (data.type === 'result') {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message bot-message';

                let html = `<strong>${data.agent}</strong><br>${data.content}`;

                if (data.citations && data.citations.length > 0) {
                    html += '<div class="citation">Sources:<br>';
                    data.citations.forEach(source => {
                        html += `• <a href="${source.url}" target="_blank" style="color:#888">${source.title}</a><br>`;
                    });
                    html += '</div>';
                }

                msgDiv.innerHTML = html;
                container.appendChild(msgDiv);
            }

            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (message && socket && socket.readyState === WebSocket.OPEN) {
                // Add user message to UI
                const container = document.getElementById('chat-container');
                const userDiv = document.createElement('div');
                userDiv.className = 'message user-message';
                userDiv.textContent = message;
                container.appendChild(userDiv);

                // Send to server
                socket.send(message);
                input.value = '';
                container.scrollTop = container.scrollHeight;
            }
        }

        document.getElementById('messageInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Initialize connection
        connect();
    </script>
</body>

</html>
