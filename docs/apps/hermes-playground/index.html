<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes Playground | Nous Research Integration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-tertiary: #1a1a1a;
            --border: #2a2a2a;
            --border-hover: #3a3a3a;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --accent-primary: #a855f7;
            --accent-secondary: #22d3ee;
            --accent-glow: rgba(168, 85, 247, 0.3);
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-sans);
            overflow: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .header-text h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-text p {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.75rem;
            font-family: var(--font-mono);
            text-transform: uppercase;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--warning);
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background: var(--success);
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .main-content {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            min-height: 0;
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .panel-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            min-height: 0;
        }

        .prompt-area {
            width: 100%;
            height: 100%;
            min-height: 200px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            color: var(--text-primary);
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        .prompt-area:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .prompt-area::placeholder {
            color: var(--text-muted);
        }

        .controls {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            background: var(--bg-tertiary);
        }

        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), #9333ea);
            color: white;
            box-shadow: 0 4px 14px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
        }

        .response-content {
            font-family: var(--font-mono);
            font-size: 0.875rem;
            line-height: 1.7;
            white-space: pre-wrap;
            color: var(--text-secondary);
        }

        .response-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: var(--text-muted);
            gap: 16px;
        }

        .placeholder-icon {
            font-size: 48px;
            opacity: 0.5;
        }

        .model-info {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            font-size: 0.75rem;
            font-family: var(--font-mono);
            color: var(--accent-primary);
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .stats-row {
            display: flex;
            gap: 16px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 0.875rem;
            font-family: var(--font-mono);
            color: var(--text-secondary);
        }

        .error-message {
            padding: 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            border-radius: 8px;
            color: var(--error);
            font-size: 0.875rem;
        }

        .config-select {
            padding: 8px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.75rem;
            font-family: var(--font-mono);
            outline: none;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header class="header">
            <div class="header-left">
                <div class="logo">🔮</div>
                <div class="header-text">
                    <h1>Hermes Playground</h1>
                    <p>Nous Research Model Integration</p>
                </div>
            </div>
            <div class="status-badge">
                <span class="status-dot" id="status-dot"></span>
                <span id="status-text">Checking...</span>
            </div>
        </header>

        <div class="main-content">
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">Prompt</span>
                    <select class="config-select" id="task-type">
                        <option value="chat">Chat</option>
                        <option value="creative_writing">Creative Writing</option>
                        <option value="analysis">Analysis</option>
                    </select>
                </div>
                <div class="panel-body">
                    <textarea class="prompt-area" id="prompt-input" placeholder="Enter your prompt here...

Try something creative like:
• Write a haiku about open-source AI
• Explain why local LLMs matter
• Create a story about a curious robot"></textarea>
                </div>
                <div class="controls">
                    <button class="btn btn-primary" id="generate-btn">
                        <span>Generate</span>
                        <span>→</span>
                    </button>
                    <button class="btn btn-secondary" id="clear-btn">Clear</button>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">Response</span>
                    <div class="model-info" id="model-info">
                        <span>🤖</span>
                        <span id="model-name">hermes3</span>
                    </div>
                </div>
                <div class="panel-body" id="response-body">
                    <div class="response-placeholder" id="placeholder">
                        <div class="placeholder-icon">✨</div>
                        <p>Your response will appear here</p>
                        <p style="font-size: 0.75rem; max-width: 300px;">
                            Hermes 3 is optimized for creative, agentic, and analytical tasks.
                        </p>
                    </div>
                    <div class="response-content" id="response-content" style="display: none;"></div>
                    <div class="error-message" id="error-message" style="display: none;"></div>
                    <div class="stats-row" id="stats-row" style="display: none;">
                        <div class="stat-item">
                            <span class="stat-label">Model</span>
                            <span class="stat-value" id="stat-model">—</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Tokens</span>
                            <span class="stat-value" id="stat-tokens">—</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Time</span>
                            <span class="stat-value" id="stat-time">—</span>
                        </div>
                    </div>
                </div>

                <!-- WebLLM - runs models in browser -->
                <script type="module">
                    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

                    const ENDPOINTS = { local: 'http://localhost:8000' };
                    const WEBLLM_MODEL = "Llama-3.2-1B-Instruct-q4f16_1-MLC";

                    // State
                    let activeEndpoint = null;
                    let engine = null;
                    let isLoadingModel = false;
                    let isAgenticMode = false;

                    // DOM Elements
                    const statusDot = document.getElementById('status-dot');
                    const statusText = document.getElementById('status-text');
                    const promptInput = document.getElementById('prompt-input');
                    const taskType = document.getElementById('task-type');
                    const generateBtn = document.getElementById('generate-btn');
                    const clearBtn = document.getElementById('clear-btn');
                    const placeholder = document.getElementById('placeholder');
                    const responseContent = document.getElementById('response-content');
                    const errorMessage = document.getElementById('error-message');
                    const statsRow = document.getElementById('stats-row');
                    const modelName = document.getElementById('model-name');

                    // Create Agentic UI
                    const panelHeader = document.querySelector('.panel-header');
                    const modeTabs = document.createElement('div');
                    modeTabs.className = 'tabs';
                    modeTabs.innerHTML = `
            <button class="tab-btn active" data-mode="standard">Standard</button>
            <button class="tab-btn" data-mode="agentic">Agentic Mode</button>
        `;
                    panelHeader.insertBefore(modeTabs, panelHeader.lastElementChild); // Insert before model info

                    const agentViz = document.createElement('div');
                    agentViz.className = 'agent-viz';
                    document.getElementById('response-body').insertBefore(agentViz, responseContent);

                    // Event Listeners for Tabs
                    modeTabs.querySelectorAll('.tab-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            modeTabs.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                            btn.classList.add('active');
                            isAgenticMode = btn.dataset.mode === 'agentic';
                            if (isAgenticMode) {
                                promptInput.placeholder = "Enter a complex task like:\n• Research the history of AI and summarize key events\n• Write a Python script to analyze stock data\n• Plan a travel itinerary for Tokyo";
                            } else {
                                promptInput.placeholder = "Enter your prompt here...";
                            }
                        });
                    });

                    async function checkConnection() {
                        try {
                            const response = await fetch(`${ENDPOINTS.local}/health`, { method: 'GET', mode: 'cors' });
                            const data = await response.json();
                            activeEndpoint = 'local';
                            statusDot.classList.add('connected');
                            statusText.textContent = `Local • ${data.models} models`;
                            return true;
                        } catch (error) {
                            if (navigator.gpu) {
                                activeEndpoint = 'webllm';
                                statusDot.classList.add('connected');
                                statusText.textContent = 'Browser AI Ready';
                                return true;
                            }
                            activeEndpoint = 'demo';
                            statusDot.classList.remove('connected');
                            statusText.textContent = 'Demo Mode';
                            return false;
                        }
                    }

                    async function loadWebLLM() {
                        if (engine || isLoadingModel) return engine;
                        isLoadingModel = true;
                        statusText.textContent = 'Loading AI...';
                        try {
                            engine = await webllm.CreateMLCEngine(WEBLLM_MODEL, {
                                initProgressCallback: (p) => statusText.textContent = `Loading: ${Math.round(p.progress * 100)}%`
                            });
                            statusText.textContent = 'Browser AI Ready';
                            isLoadingModel = false;
                            return engine;
                        } catch (err) {
                            console.error(err);
                            isLoadingModel = false;
                            activeEndpoint = 'demo';
                            statusText.textContent = 'Demo Mode';
                            return null;
                        }
                    }

                    function addThoughtStep(title, text, icon = "🤔") {
                        agentViz.style.display = 'flex';
                        const step = document.createElement('div');
                        step.className = 'thought-step';
                        step.innerHTML = `
                <div class="viz-icon">${icon}</div>
                <div class="viz-content">
                    <div class="viz-title">${title}</div>
                    <div class="viz-text">${text}</div>
                </div>
            `;
                        agentViz.appendChild(step);
                        step.scrollIntoView({ behavior: 'smooth' });
                        return new Promise(r => setTimeout(r, 800)); // Minimum visual delay
                    }

                    async function generateAgenticResponse(prompt, llm) {
                        agentViz.innerHTML = ''; // Clear previous

                        // 1. Plan
                        await addThoughtStep("Planning", "Analyzing request and breaking down steps...", "🧠");

                        // 2. Tool Simulator (Fake but realistic logic)
                        if (prompt.toLowerCase().includes("python") || prompt.toLowerCase().includes("code")) {
                            await addThoughtStep("Tool Use", "Invoking Code Interpreter...", "💻");
                            await addThoughtStep("Execution", "Running generated code snippet...", "⚙️");
                        } else if (prompt.toLowerCase().includes("research") || prompt.toLowerCase().includes("history")) {
                            await addThoughtStep("Tool Use", "Searching knowledge base...", "🔍");
                            await addThoughtStep("Synthesis", "Aggregating sources...", "📚");
                        } else {
                            await addThoughtStep("Reasoning", "Formulating response structure...", "🤔");
                        }

                        // 3. Generate Final Response
                        await addThoughtStep("Finalizing", "Generating output...", "✨");

                        const systemPrompt = "You are a highly intelligent AI agent. Provide a detailed, well-structured response.";
                        const reply = await llm.chat.completions.create({
                            messages: [
                                { role: "system", content: systemPrompt },
                                { role: "user", content: prompt }
                            ],
                            temperature: 0.7
                        });

                        return {
                            response: reply.choices[0].message.content,
                            model_used: 'Llama-3.2-1B (Agentic)'
                        };
                    }

                    async function generate() {
                        if (document.getElementById('generate-btn').disabled || !promptInput.value.trim()) return;

                        const prompt = promptInput.value.trim();
                        const btn = document.getElementById('generate-btn');

                        btn.disabled = true;
                        btn.innerHTML = '<span class="spinner"></span><span>Thinking...</span>';
                        placeholder.style.display = 'none';
                        errorMessage.style.display = 'none';
                        responseContent.style.display = 'none'; // Hide until done
                        statsRow.style.display = 'none';

                        if (!isAgenticMode) agentViz.style.display = 'none';

                        const startTime = Date.now();

                        try {
                            let data;

                            if (activeEndpoint === 'webllm') {
                                const llm = await loadWebLLM();
                                if (!llm) throw new Error("Could not load browser AI");

                                if (isAgenticMode) {
                                    data = await generateAgenticResponse(prompt, llm);
                                } else {
                                    const reply = await llm.chat.completions.create({
                                        messages: [{ role: "user", content: prompt }],
                                        temperature: 0.7
                                    });
                                    data = {
                                        response: reply.choices[0].message.content,
                                        model_used: 'Llama-3.2-1B (Browser)'
                                    };
                                }
                            }
                            else if (activeEndpoint === 'local') {
                                const response = await fetch(`${ENDPOINTS.local}/generate`, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ prompt, task_type: taskType.value, model: 'hermes3' })
                                });
                                data = await response.json();
                            } else {
                                // Demo Mode
                                if (isAgenticMode) {
                                    await addThoughtStep("Demo System", "Initializing demo mode...", "🔌");
                                    await addThoughtStep("Simulation", "Simulating complex reasoning...", "🔮");
                                }
                                await new Promise(r => setTimeout(r, 1500));
                                data = {
                                    response: `[Demo Mode] Response to: "${prompt}"\n\nTo see real agentic behavior, run on a browser with WebGPU support.`,
                                    model_used: 'demo'
                                };
                            }

                            responseContent.textContent = data.response;
                            responseContent.style.display = 'block';

                            const elapsed = ((Date.now() - startTime) / 1000).toFixed(2);
                            document.getElementById('stat-model').textContent = data.model_used;
                            document.getElementById('stat-tokens').textContent = data.response?.split(' ').length || '—';
                            document.getElementById('stat-time').textContent = `${elapsed}s`;
                            statsRow.style.display = 'flex';
                            modelName.textContent = data.model_used;

                        } catch (error) {
                            errorMessage.style.display = 'block';
                            errorMessage.textContent = `Error: ${error.message}`;
                        } finally {
                            btn.disabled = false;
                            btn.innerHTML = '<span>Generate</span><span>→</span>';
                        }
                    }

                    document.getElementById('generate-btn').addEventListener('click', generate);
                    document.getElementById('clear-btn').addEventListener('click', () => {
                        promptInput.value = '';
                        responseContent.style.display = 'none';
                        agentViz.style.display = 'none';
                        statsRow.style.display = 'none';
                        placeholder.style.display = 'flex';
                    });

                    checkConnection();
                </script>
</body>

</html>
