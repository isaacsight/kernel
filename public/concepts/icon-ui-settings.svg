<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <!-- Engine / Configuration dials -->
  <circle cx="128" cy="128" r="48" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="128" cy="128" r="16" stroke="currentColor" stroke-width="1.5"/>

  <!-- Dial markers -->
  <line x1="128" y1="40" x2="128" y2="64" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="128" y1="192" x2="128" y2="216" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="128" x2="64" y2="128" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="192" y1="128" x2="216" y2="128" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Intermediary markers -->
  <line x1="66" y1="66" x2="83" y2="83" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="190" y1="66" x2="173" y2="83" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="66" y1="190" x2="83" y2="173" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="190" y1="190" x2="173" y2="173" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Outer orbital tracking radius -->
  <circle cx="128" cy="128" r="96" stroke="currentColor" stroke-width="1" stroke-dasharray="4 4" opacity="0.3"/>
</svg>
