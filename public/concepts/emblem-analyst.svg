<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <!-- Analyst — Prism refracting light into spectrum -->
  <circle cx="128" cy="128" r="120" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Prism — equilateral triangle -->
  <polygon points="128,68 176,172 80,172" stroke="#A0768C" stroke-width="1.5" fill="none" stroke-linejoin="round"/>

  <!-- Incoming light ray — single beam from left -->
  <line x1="42" y1="120" x2="104" y2="120" stroke="#A0768C" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Refracted rays — fanning out to the right -->
  <line x1="160" y1="108" x2="214" y2="88" stroke="#A0768C" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
  <line x1="162" y1="116" x2="214" y2="108" stroke="#A0768C" stroke-width="1" stroke-linecap="round" opacity="0.65"/>
  <line x1="163" y1="124" x2="214" y2="128" stroke="#A0768C" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="162" y1="132" x2="214" y2="148" stroke="#A0768C" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
  <line x1="160" y1="140" x2="214" y2="168" stroke="#A0768C" stroke-width="1" stroke-linecap="round" opacity="0.2"/>

  <!-- Inner refraction detail -->
  <line x1="104" y1="120" x2="160" y2="124" stroke="#A0768C" stroke-width="0.5" opacity="0.2" stroke-dasharray="2 3"/>

  <!-- Small measurement marks — analytical precision -->
  <line x1="80" y1="176" x2="80" y2="184" stroke="#A0768C" stroke-width="0.5" opacity="0.3"/>
  <line x1="128" y1="176" x2="128" y2="184" stroke="#A0768C" stroke-width="0.5" opacity="0.3"/>
  <line x1="176" y1="176" x2="176" y2="184" stroke="#A0768C" stroke-width="0.5" opacity="0.3"/>
</svg>
