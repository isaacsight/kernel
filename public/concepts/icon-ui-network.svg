<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <!-- Network nodes connection -->
  <line x1="128" y1="64" x2="64" y2="160" stroke="currentColor" stroke-width="1.5"/>
  <line x1="128" y1="64" x2="192" y2="160" stroke="currentColor" stroke-width="1.5"/>

  <!-- Subtle lateral connection -->
  <line x1="64" y1="160" x2="192" y2="160" stroke="currentColor" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>

  <!-- Core Node -->
  <circle cx="128" cy="64" r="16" fill="currentColor"/>
  <circle cx="128" cy="64" r="24" stroke="currentColor" stroke-width="1" opacity="0.3"/>

  <!-- Sub Nodes -->
  <circle cx="64" cy="160" r="12" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="192" cy="160" r="12" fill="none" stroke="currentColor" stroke-width="1.5"/>

  <circle cx="64" cy="160" r="4" fill="currentColor"/>
  <circle cx="192" cy="160" r="4" fill="currentColor"/>
</svg>
