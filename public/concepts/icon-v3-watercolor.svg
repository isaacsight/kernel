<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- V3: Watercolor Wash — soft amethyst bleed behind the K -->
  <defs>
    <filter id="watercolor" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="4" seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="18" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <radialGradient id="wash" cx="50%" cy="48%" r="28%">
      <stop offset="0%" stop-color="#6B5B95" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#6B5B95" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#6B5B95" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="#FAF9F6"/>
  <!-- Watercolor wash -->
  <ellipse cx="512" cy="490" rx="300" ry="280" fill="url(#wash)" filter="url(#watercolor)"/>
  <circle cx="512" cy="512" r="340" fill="none" stroke="#D4C5A9" stroke-width="3"/>
  <text x="512" y="600" text-anchor="middle" font-family="Georgia, 'EB Garamond', serif"
        font-style="italic" font-size="420" font-weight="400" fill="#6B5B95">K</text>
</svg>
