<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Aesthete — Italic sparkle with radiating accent lines -->
  <circle cx="60" cy="60" r="56" fill="#FAF9F6" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="60" y="74" text-anchor="middle" font-family="EB Garamond, Georgia, serif"
        font-style="italic" font-size="56" font-weight="400" fill="#F472B6">A</text>
  <!-- Sparkle accent -->
  <line x1="60" y1="90" x2="60" y2="100" stroke="#F472B6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="54" y1="95" x2="66" y2="95" stroke="#F472B6" stroke-width="1.5" stroke-linecap="round"/>
</svg>
