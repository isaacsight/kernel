<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Direction 1: The Kernel Mark — A refined K in a subtle circle -->
  <!-- Warm ivory background circle with slate stroke -->
  <circle cx="60" cy="60" r="56" fill="#FAF9F6" stroke="#1F1E1D" stroke-width="1.5"/>
  <!-- EB Garamond-inspired serif K -->
  <text x="60" y="78" text-anchor="middle" font-family="EB Garamond, Georgia, serif" font-size="64" font-weight="400" fill="#1F1E1D" letter-spacing="-2">K</text>
  <!-- Subtle dot — the "kernel" seed -->
  <circle cx="60" cy="102" r="2" fill="#6366F1"/>
</svg>
