<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <!-- Briefings Empty State — Folded newspaper with fountain pen -->

  <!-- Dashed framing circle -->
  <circle cx="100" cy="80" r="70" stroke="#D4C5A9" stroke-width="0.8" stroke-dasharray="4 4" fill="none" opacity="0.3"/>

  <!-- Folded newspaper — front page -->
  <rect x="55" y="42" width="72" height="90" rx="2" stroke="#D4C5A9" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Fold crease -->
  <line x1="55" y1="72" x2="127" y2="72" stroke="#D4C5A9" stroke-width="0.5" opacity="0.3"/>

  <!-- Headline lines -->
  <line x1="64" y1="54" x2="118" y2="54" stroke="#6B5B95" stroke-width="1.2" opacity="0.4"/>
  <line x1="64" y1="62" x2="100" y2="62" stroke="#6B5B95" stroke-width="0.8" opacity="0.3"/>

  <!-- Body text lines (below fold) -->
  <line x1="64" y1="82" x2="118" y2="82" stroke="#D4C5A9" stroke-width="0.5" opacity="0.25"/>
  <line x1="64" y1="89" x2="112" y2="89" stroke="#D4C5A9" stroke-width="0.5" opacity="0.2"/>
  <line x1="64" y1="96" x2="118" y2="96" stroke="#D4C5A9" stroke-width="0.5" opacity="0.2"/>
  <line x1="64" y1="103" x2="96" y2="103" stroke="#D4C5A9" stroke-width="0.5" opacity="0.15"/>

  <!-- Fountain pen — resting diagonally -->
  <line x1="120" y1="98" x2="148" y2="130" stroke="#6B5B95" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Pen nib -->
  <path d="M148 130 L150 134 L146 132 Z" fill="#6B5B95" opacity="0.5"/>
  <!-- Pen clip -->
  <line x1="122" y1="100" x2="126" y2="96" stroke="#6B5B95" stroke-width="0.8" opacity="0.3"/>

  <!-- Morning sun accent -->
  <circle cx="44" cy="38" r="6" stroke="#D4C5A9" stroke-width="0.8" fill="none" opacity="0.3"/>
  <line x1="44" y1="28" x2="44" y2="31" stroke="#D4C5A9" stroke-width="0.5" opacity="0.2"/>
  <line x1="36" y1="33" x2="38" y2="35" stroke="#D4C5A9" stroke-width="0.5" opacity="0.2"/>
  <line x1="52" y1="33" x2="50" y2="35" stroke="#D4C5A9" stroke-width="0.5" opacity="0.2"/>
</svg>
