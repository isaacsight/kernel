<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" fill="none">
  <!-- Onboarding Step 3: Agents — 5 instruments arranged as still life -->
  <rect width="280" height="280" fill="#FAF9F6"/>

  <!-- Surface line -->
  <line x1="30" y1="220" x2="250" y2="220" stroke="#D4C5A9" stroke-width="0.8"/>

  <!-- 1. Compass (Kernel) — center, dominant -->
  <circle cx="140" cy="160" r="36" stroke="#6B5B95" stroke-width="1.5" fill="none"/>
  <circle cx="140" cy="160" r="2" fill="#6B5B95"/>
  <line x1="140" y1="128" x2="140" y2="136" stroke="#6B5B95" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="140" y1="184" x2="140" y2="192" stroke="#6B5B95" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="108" y1="160" x2="116" y2="160" stroke="#6B5B95" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="164" y1="160" x2="172" y2="160" stroke="#6B5B95" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Compass needle -->
  <line x1="140" y1="140" x2="152" y2="170" stroke="#6B5B95" stroke-width="1" stroke-linecap="round"/>

  <!-- 2. Magnifying glass (Researcher) — left -->
  <circle cx="60" cy="150" r="20" stroke="#5B8BA0" stroke-width="1.5" fill="none"/>
  <line x1="74" y1="164" x2="88" y2="178" stroke="#5B8BA0" stroke-width="2" stroke-linecap="round"/>

  <!-- 3. Angle brackets (Coder) — far right -->
  <polyline points="210,140 196,158 210,176" stroke="#6B8E6B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polyline points="230,140 244,158 230,176" stroke="#6B8E6B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- 4. Quill (Writer) — leaning left -->
  <line x1="82" y1="90" x2="96" y2="210" stroke="#B8875C" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M82 90 L78 84 L86 88 Z" fill="#B8875C"/>
  <!-- Feather barbs -->
  <path d="M84 100 Q74 96 70 102" stroke="#B8875C" stroke-width="0.6" fill="none" opacity="0.3"/>
  <path d="M86 114 Q76 110 72 116" stroke="#B8875C" stroke-width="0.6" fill="none" opacity="0.3"/>

  <!-- 5. Prism (Analyst) — right of center -->
  <polygon points="204,100 224,140 184,140" stroke="#A0768C" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
  <!-- Refraction lines -->
  <line x1="224" y1="118" x2="244" y2="110" stroke="#A0768C" stroke-width="0.6" opacity="0.3"/>
  <line x1="224" y1="124" x2="244" y2="124" stroke="#A0768C" stroke-width="0.6" opacity="0.3"/>
  <line x1="224" y1="130" x2="244" y2="138" stroke="#A0768C" stroke-width="0.6" opacity="0.3"/>

  <!-- Shadow beneath objects -->
  <ellipse cx="140" cy="220" rx="120" ry="4" fill="#D4C5A9" opacity="0.15"/>
</svg>
