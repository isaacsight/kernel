<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- V2: Paper Grain — aged paper texture via noise filter -->
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="multiply"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="#FAF9F6"/>
  <rect width="1024" height="1024" rx="224" fill="#F5F0E8" opacity="0.4" filter="url(#grain)"/>
  <circle cx="512" cy="512" r="340" fill="none" stroke="#D4C5A9" stroke-width="3"/>
  <text x="512" y="600" text-anchor="middle" font-family="Georgia, 'EB Garamond', serif"
        font-style="italic" font-size="420" font-weight="400" fill="#6B5B95">K</text>
</svg>
