<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <!-- Workflows Empty State — Interlocking gears / mechanical chain -->

  <!-- Dashed framing circle -->
  <circle cx="100" cy="80" r="70" stroke="#D4C5A9" stroke-width="0.8" stroke-dasharray="4 4" fill="none" opacity="0.3"/>

  <!-- Large gear -->
  <circle cx="82" cy="72" r="24" stroke="#6B5B95" stroke-width="1" fill="none" opacity="0.35"/>
  <circle cx="82" cy="72" r="18" stroke="#6B5B95" stroke-width="0.5" fill="none" opacity="0.2"/>
  <circle cx="82" cy="72" r="4" fill="#6B5B95" opacity="0.3"/>
  <!-- Gear teeth -->
  <line x1="82" y1="46" x2="82" y2="50" stroke="#6B5B95" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="82" y1="94" x2="82" y2="98" stroke="#6B5B95" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="56" y1="72" x2="60" y2="72" stroke="#6B5B95" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="104" y1="72" x2="108" y2="72" stroke="#6B5B95" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="65" y1="55" x2="68" y2="58" stroke="#6B5B95" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="96" y1="86" x2="99" y2="89" stroke="#6B5B95" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="65" y1="89" x2="68" y2="86" stroke="#6B5B95" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="96" y1="58" x2="99" y2="55" stroke="#6B5B95" stroke-width="2" stroke-linecap="round" opacity="0.3"/>

  <!-- Small gear (meshed) -->
  <circle cx="120" cy="92" r="16" stroke="#6B5B95" stroke-width="1" fill="none" opacity="0.3"/>
  <circle cx="120" cy="92" r="10" stroke="#6B5B95" stroke-width="0.5" fill="none" opacity="0.2"/>
  <circle cx="120" cy="92" r="3" fill="#6B5B95" opacity="0.25"/>
  <!-- Small gear teeth -->
  <line x1="120" y1="74" x2="120" y2="78" stroke="#6B5B95" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <line x1="120" y1="106" x2="120" y2="110" stroke="#6B5B95" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <line x1="102" y1="92" x2="106" y2="92" stroke="#6B5B95" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <line x1="134" y1="92" x2="138" y2="92" stroke="#6B5B95" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>

  <!-- Connection line — workflow chain -->
  <path d="M140 80 Q150 70 156 60" stroke="#D4C5A9" stroke-width="0.8" fill="none" stroke-dasharray="3 3" opacity="0.3"/>
  <circle cx="156" cy="58" r="2" fill="#D4C5A9" opacity="0.3"/>
</svg>
