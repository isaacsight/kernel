<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <!-- Knowledge Graph Empty State — Growing tree with constellation branches -->

  <!-- Dashed framing circle -->
  <circle cx="100" cy="80" r="70" stroke="#D4C5A9" stroke-width="0.8" stroke-dasharray="4 4" fill="none" opacity="0.3"/>

  <!-- Ground line -->
  <line x1="60" y1="130" x2="140" y2="130" stroke="#D4C5A9" stroke-width="0.5" opacity="0.25"/>

  <!-- Trunk -->
  <path d="M100 130 Q100 100 100 80" stroke="#6B5B95" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Main branches -->
  <path d="M100 80 Q85 65 70 52" stroke="#6B5B95" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M100 80 Q115 60 130 48" stroke="#6B5B95" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M100 80 Q90 55 80 40" stroke="#6B5B95" stroke-width="0.8" fill="none" opacity="0.25"/>
  <path d="M100 80 Q110 58 120 38" stroke="#6B5B95" stroke-width="0.8" fill="none" opacity="0.25"/>
  <path d="M100 80 Q100 60 100 42" stroke="#6B5B95" stroke-width="0.8" fill="none" opacity="0.25"/>

  <!-- Node dots (knowledge entities) -->
  <circle cx="70" cy="52" r="3" stroke="#6B5B95" stroke-width="0.8" fill="none" opacity="0.4"/>
  <circle cx="130" cy="48" r="3" stroke="#6B5B95" stroke-width="0.8" fill="none" opacity="0.4"/>
  <circle cx="80" cy="40" r="2.5" stroke="#6B5B95" stroke-width="0.8" fill="none" opacity="0.35"/>
  <circle cx="120" cy="38" r="2.5" stroke="#6B5B95" stroke-width="0.8" fill="none" opacity="0.35"/>
  <circle cx="100" cy="42" r="2.5" stroke="#6B5B95" stroke-width="0.8" fill="none" opacity="0.35"/>

  <!-- Connection lines between nodes (constellation) -->
  <line x1="70" y1="52" x2="80" y2="40" stroke="#D4C5A9" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.25"/>
  <line x1="80" y1="40" x2="100" y2="42" stroke="#D4C5A9" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.25"/>
  <line x1="100" y1="42" x2="120" y2="38" stroke="#D4C5A9" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.25"/>
  <line x1="120" y1="38" x2="130" y2="48" stroke="#D4C5A9" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.25"/>

  <!-- Seed at base -->
  <ellipse cx="100" cy="130" rx="4" ry="2" fill="#6B5B95" opacity="0.2"/>
</svg>
