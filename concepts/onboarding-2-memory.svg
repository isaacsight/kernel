  <line x1="80" y1="150" x2="200" y2="150" stroke="#D4C5A9" stroke-width="0.4" opacity="0.3"/>
  <line x1="80" y1="166" x2="200" y2="166" stroke="#D4C5A9" stroke-width="0.4" opacity="0.3"/>
  <line x1="80" y1="182" x2="200" y2="182" stroke="#D4C5A9" stroke-width="0.4" opacity="0.3"/>
  <line x1="80" y1="198" x2="200" y2="198" stroke="#D4C5A9" stroke-width="0.4" opacity="0.3"/>
  <line x1="80" y1="214" x2="200" y2="214" stroke="#D4C5A9" stroke-width="0.4" opacity="0.3"/>

  <!-- Handwritten text lines — varying lengths -->
  <path d="M100 85 Q120 83 145 85 Q165 87 185 84" stroke="#6B5B95" stroke-width="0.7" opacity="0.25" fill="none"/>
  <path d="M100 101 Q130 99 170 101" stroke="#6B5B95" stroke-width="0.7" opacity="0.25" fill="none"/>
  <path d="M100 117 Q115 115 140 117 Q160 119 190 116" stroke="#6B5B95" stroke-width="0.7" opacity="0.25" fill="none"/>
  <path d="M100 133 Q125 131 155 133" stroke="#6B5B95" stroke-width="0.7" opacity="0.25" fill="none"/>
  <path d="M100 149 Q135 147 175 149 Q185 150 195 148" stroke="#6B5B95" stroke-width="0.7" opacity="0.25" fill="none"/>
  <path d="M100 165 Q120 163 148 165" stroke="#6B5B95" stroke-width="0.7" opacity="0.25" fill="none"/>

  <!-- Marginalia — amethyst annotations in the margin -->
  <path d="M74 100 Q78 96 82 100" stroke="#6B5B95" stroke-width="0.8" opacity="0.5" fill="none"/>
  <circle cx="78" cy="134" r="3" stroke="#6B5B95" stroke-width="0.6" fill="none" opacity="0.4"/>
