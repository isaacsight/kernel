  <line x1="80" y1="102" x2="200" y2="102" stroke="#D4C5A9" stroke-width="0.4" opacity="0.3"/>
  <line x1="80" y1="118" x2="200" y2="118" stroke="#D4C5A9" stroke-width="0.4" opacity="0.3"/>
