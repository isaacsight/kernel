  <path d="M214 62 L214 92 Q214 62 190 62" fill="#FAF9F6" stroke="#D4C5A9" stroke-width="0.8"/>
  <path d="M214 92 Q210 78 190 62" fill="none" stroke="#D4C5A9" stroke-width="0.5" opacity="0.3"/>
