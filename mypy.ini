[mypy]
# Mypy Configuration for Sovereign Laboratory OS
# Phase 1: Gradual Typing Strategy

# General settings
python_version = 3.9
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False  # Start permissive, tighten later
check_untyped_defs = True

# Import settings
ignore_missing_imports = True  # Allow third-party libraries without stubs
follow_imports = normal

# Error output
show_error_codes = True
show_error_context = True
pretty = True
color_output = True

# Strictness (progressive enhancement)
# Phase 1: Basic checks
warn_redundant_casts = True
warn_unused_ignores = True
no_implicit_optional = True

# Phase 2 (future): Enable these incrementally
# disallow_untyped_defs = True
# disallow_any_unimported = True
# disallow_any_expr = True
# disallow_incomplete_defs = True
# strict_equality = True
# strict_concatenate = True

# Per-module configuration
[mypy-admin.brain.*]
# Brain modules: Medium strictness
disallow_untyped_defs = False
check_untyped_defs = True
warn_return_any = True

[mypy-core.*]
# Core orchestration: High priority for type safety
disallow_untyped_defs = False
check_untyped_defs = True
warn_return_any = True

[mypy-admin.engineers.*]
# Engineers: Start permissive (100+ files)
disallow_untyped_defs = False
warn_return_any = False

[mypy-dtfr.*]
# DTFR: Critical path, higher standards
disallow_untyped_defs = False
check_untyped_defs = True

# Third-party library stubs (ignore for now)
[mypy-frontmatter.*]
ignore_missing_imports = True

[mypy-google.*]
ignore_missing_imports = True

[mypy-anthropic.*]
ignore_missing_imports = True

[mypy-openai.*]
ignore_missing_imports = True

[mypy-stripe.*]
ignore_missing_imports = True

[mypy-playwright.*]
ignore_missing_imports = True

[mypy-tiktoken.*]
ignore_missing_imports = True

[mypy-edge_tts.*]
ignore_missing_imports = True

[mypy-moviepy.*]
ignore_missing_imports = True

[mypy-requests.*]
ignore_missing_imports = True
