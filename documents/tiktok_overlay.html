<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio OS // Overlay</title>
    <style>
        body {
            background-color: #000;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            width: 80%;
            border: 1px solid #333;
            padding: 40px;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }

        .header {
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .content {
            font-size: 2rem;
            line-height: 1.5;
            text-transform: uppercase;
        }

        .cursor {
            display: inline-block;
            width: 12px;
            height: 2rem;
            background-color: #00ff41;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.3) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>

<body>
    <div class="scanline"></div>
    <div class="container">
        <div class="header">
            <span>SYS.ROUTINE: PUBLISH</span>
            <span>PORT: 8000</span>
        </div>
        <div class="content">
            > INITIATING SEQUENCE...<br>
            > COMPILING MEMORIES...<br>
            > SYNCING TO CLOUD...<br>
            > <span style="color: #fff; text-shadow: 0 0 10px #fff;">LIVE</span><span class="cursor"></span>
        </div>
    </div>
</body>

</html>
