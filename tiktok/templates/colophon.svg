<?xml version="1.0" encoding="UTF-8"?>
<!--
  kernel.chat — TikTok Template: Colophon (Credits)
  Duration: 15–25s
  Spec: docs/tiktok-tokens.md
  Doc:  docs/tiktok.md § Colophon

  Slot-fill contract:
    #ground         → issue stock color
    #kicker-text    → [COLOPHON · 奥付]
    #credits        → editorial team block (name : role pairs)
    #sign-off       → 街のコーダーたちへ
    #colophon-text  → ISSUE N · MONTH YEAR

  Per-cut motion:
    0–30f   (0–1s)    kicker
    30–90f  (1–3s)    first credit line arrives
    90–360f (3–12s)   remaining credits stagger in at 2f each
    360–540f (12–18s) hold
    540–600f (18–20s) sign-off italic fades in
    600–750f (20–25s) colophon
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1080 1920"
     width="1080" height="1920"
     preserveAspectRatio="xMidYMid meet">

  <defs>
    <style type="text/css"><![CDATA[
      .tk-serif  { font-family: 'EB Garamond', Garamond, serif; }
      .tk-mono   { font-family: 'Courier Prime', 'Courier New', monospace; }
      .tk-kicker { font-size: 36px; letter-spacing: 0.16em; fill: #E24E1B; text-transform: uppercase; }
      .tk-role   { font-size: 28px; letter-spacing: 0.16em; fill: #6B4E3D; text-transform: uppercase; }
      .tk-name   { font-size: 56px; fill: #1F1E1D; }
      .tk-signoff{ font-size: 48px; font-style: italic; fill: #E24E1B; }
      .tk-colo   { font-size: 28px; letter-spacing: 0.14em; fill: #1F1E1D; text-transform: uppercase; }
    ]]></style>
  </defs>

  <rect id="ground" x="0" y="0" width="1080" height="1920" fill="#F3E9D2"/>

  <g id="kicker">
    <text id="kicker-text" class="tk-mono tk-kicker"
          x="80" y="130">[COLOPHON · 奥付]</text>
  </g>

  <rect x="80" y="180" width="180" height="6" fill="#E24E1B"/>

  <g id="content">
    <g id="credits">
      <text class="tk-mono tk-role"   x="80" y="420">EDITOR-IN-CHIEF</text>
      <text class="tk-serif tk-name"  x="80" y="490">Isaac Hernandez</text>

      <text class="tk-mono tk-role"   x="80" y="600">CREATIVE DIRECTION</text>
      <text class="tk-serif tk-name"  x="80" y="670">kernel.chat group</text>

      <text class="tk-mono tk-role"   x="80" y="780">ART DIRECTION</text>
      <text class="tk-serif tk-name"  x="80" y="850">in-house</text>

      <text class="tk-mono tk-role"   x="80" y="960">COPY</text>
      <text class="tk-serif tk-name"  x="80" y="1030">kernel.chat editorial</text>

      <text class="tk-mono tk-role"   x="80" y="1140">JAPANESE</text>
      <text class="tk-serif tk-name"  x="80" y="1210">kernel.chat editorial</text>

      <text class="tk-mono tk-role"   x="80" y="1320">PRODUCTION</text>
      <text class="tk-serif tk-name"  x="80" y="1390">kernel.chat group</text>
    </g>

    <text id="sign-off" class="tk-serif tk-signoff"
          x="80" y="1620">街のコーダーたちへ</text>
  </g>

  <g id="colophon">
    <rect x="80" y="1760" width="920" height="8" fill="#E24E1B"/>
    <text id="colophon-text" class="tk-mono tk-colo"
          x="540" y="1810" text-anchor="middle">ISSUE 365 · APRIL 2026</text>
  </g>
</svg>
