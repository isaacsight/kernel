---
title: Archive
description: All essays and notes.
slug: archive
---

<div class="archive-container">
    <h1>Archive</h1>
    <div id="archive-list" class="card-grid">
        <!-- Posts will be loaded here -->
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        fetch('/posts.json')
            .then(response => response.json())
            .then(posts => {
                const container = document.getElementById('archive-list');
                const sortedPosts = posts.sort((a, b) => new Date(b.date) - new Date(a.date));

                sortedPosts.forEach(post => {
                    // Skip hidden or technical posts if needed
                    if (post.slug === 'archive' || post.slug === '404') return;

                    const card = document.createElement('a');
                    card.href = post.output_rel_path || (post.slug + '.html');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="card__meta">
                            <span class="badge">${post.mode || 'Essay'}</span>
                            <span class="date">${post.date}</span>
                        </div>
                        <div class="card__title">${post.title}</div>
                        <div class="card__desc">${post.tldr || post.excerpt || ''}</div>
                    `;
                    container.appendChild(card);
                });
            })
            .catch(error => {
                console.error('Error loading posts:', error);
                document.getElementById('archive-list').innerHTML = '<p>Failed to load archive.</p>';
            });
    });
</script>

<style>
    .archive-container {
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem 1rem;
    }
</style>
