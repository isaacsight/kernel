<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studio OS</title>
  <style>
    body {
      background: #020202;
      margin: 0;
      overflow: hidden;
    }

    #preloader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #020202;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-family: monospace;
      color: #00D6A3;
      text-transform: uppercase;
      letter-spacing: 0.5em;
      font-size: 10px;
    }

    .spinner {
      width: 40px;
      height: 1px;
      background: rgba(0, 214, 163, 0.1);
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .spinner::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: #00D6A3;
      animation: flow 1.5s ease-in-out infinite;
    }

    @keyframes flow {
      100% {
        left: 100%;
      }
    }
  </style>
</head>

<body>
  <div id="preloader">
    <div class="spinner"></div>
    STUDIO_OS_INITIALIZING
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    window.addEventListener('load', () => {
      const p = document.getElementById('preloader');
      if (p) p.style.display = 'none';
    });
  </script>
</body>

</html>
