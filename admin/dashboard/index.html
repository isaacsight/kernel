<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio OS | Brain Dashboard</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: #eee;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        #network {
            width: 100vw;
            height: 100vh;
        }

        #overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 12px;
            pointer-events: none;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        .stat {
            font-size: 0.9rem;
            margin-bottom: 5px;
            color: #aaa;
        }

        .log-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 300px;
            height: 150px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.5);
            font-family: monospace;
            font-size: 0.8rem;
            padding: 10px;
            border-radius: 8px;
            pointer-events: none;
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div id="network"></div>
    <div id="overlay">
        <h1>Studio OS <span style="color: #0f0; font-size: 0.8em;">● ONLINE</span></h1>
        <div class="stat">🧠 Memory Nodes: <span id="node-count">0</span></div>
        <div class="stat">⚡ Active Agents: <span id="agent-count">3</span></div>
        <div class="stat">🔄 Last Cycle: <span id="last-cycle">Just now</span></div>
    </div>
    <div class="log-panel" id="logs">
        > System Initialized...<br>
        > Waiting for telemetry...
    </div>

    <script>
        // Graph Configuration
        const container = document.getElementById('network');
        const data = { nodes: new vis.DataSet([]), edges: new vis.DataSet([]) };
        const options = {
            nodes: { shape: 'dot', size: 16, font: { color: '#ffffff' }, borderWidth: 2 },
            edges: { width: 1, color: { color: '#ffffff', opacity: 0.2 }, smooth: { type: 'continuous' } },
            physics: { stabilization: false, barnesHut: { gravitationalConstant: -2000, springConstant: 0.04 } },
            interaction: { dragNodes: true, zoomView: true }
        };
        const network = new vis.Network(container, data, options);

        // Fetch Data Loop
        async function updateBrain() {
            try {
                const res = await fetch('/api/memory');
                const json = await res.json();

                // Diff and Update Nodes
                const currentIds = data.nodes.getIds();
                const newNodes = [];
                const newEdges = [];

                json.nodes.forEach(node => {
                    if (!currentIds.includes(node.id)) {
                        newNodes.push({
                            id: node.id,
                            label: node.label,
                            color: node.type === 'concept' ? '#4f9fff' : '#ff4f4f'
                        });
                        // Connect to center or related (random for demo if no relations yet)
                        if (data.nodes.length > 0) {
                            // Connect purely for visual structure in this demo
                            const target = data.nodes.getIds()[Math.floor(Math.random() * data.nodes.length)];
                            newEdges.push({ from: node.id, to: target });
                        }
                    }
                });

                if (newNodes.length > 0) {
                    data.nodes.add(newNodes);
                    data.edges.add(newEdges);
                    document.getElementById('node-count').innerText = data.nodes.length;
                    log('Index updated: ' + newNodes.length + ' new thoughts.');
                }

            } catch (e) {
                console.error("Brain sync error:", e);
            }
        }

        function log(msg) {
            const panel = document.getElementById('logs');
            panel.innerHTML += `> ${msg}<br>`;
            panel.scrollTop = panel.scrollHeight;
        }

        setInterval(updateBrain, 5000);
        updateBrain();
    </script>
</body>

</html>
