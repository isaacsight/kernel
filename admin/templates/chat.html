<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio AI | Chat</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-dark: #09090b;
            /* Zinc 950 */
            --bg-gradient-start: #18181b;
            /* Zinc 900 */
            --bg-gradient-end: #09090b;

            --glass-bg: rgba(24, 24, 27, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);

            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.4);

            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;

            --msg-ai-bg: rgba(39, 39, 42, 0.8);
            --msg-user-bg: #2563eb;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(to bottom, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Ambient Background Mesh */
        body::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -20%;
            width: 80%;
            height: 80%;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            filter: blur(80px);
            opacity: 0.15;
            z-index: -1;
            pointer-events: none;
        }

        header {
            background-color: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .header-title {
            font-weight: 600;
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            letter-spacing: -0.01em;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.4);
        }

        /* Chat Container */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 85%;
            padding: 0.85rem 1.2rem;
            border-radius: 20px;
            line-height: 1.6;
            font-size: 0.95rem;
            position: relative;
            word-wrap: break-word;
            animation: slideUp 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(15px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--msg-user-bg), var(--primary));
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.ai {
            align-self: flex-start;
            background-color: var(--msg-ai-bg);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
            color: var(--text-main);
        }

        .message.ai pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 0.75rem;
            border-radius: 8px;
            overflow-x: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            margin: 0.75rem 0;
            border: 1px solid var(--glass-border);
        }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background-color: var(--msg-ai-bg);
            padding: 0.75rem 1.2rem;
            border-radius: 20px;
            border-bottom-left-radius: 4px;
            margin-bottom: 1rem;
            border: 1px solid var(--glass-border);
        }

        .dots {
            display: flex;
            gap: 5px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background-color: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
                opacity: 0.5;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Input Area with Glassmorphism */
        .input-area {
            background-color: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 1rem 1.25rem;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 0.75rem;
            padding-bottom: env(safe-area-inset-bottom, 1.25rem);
            z-index: 50;
            position: relative;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.1);
        }

        #message-input {
            flex: 1;
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 99px;
            padding: 0.85rem 1.25rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
        }

        #message-input:focus {
            border-color: var(--primary);
            background-color: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        #send-btn {
            background: linear-gradient(135deg, var(--primary), #2563eb);
            color: white;
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        #send-btn:active {
            transform: scale(0.92);
        }

        #send-btn svg {
            width: 22px;
            height: 22px;
            fill: white;
            transform: translateX(2px);
        }

        /* Quick Actions Chips */
        .quick-actions {
            display: flex;
            gap: 0.6rem;
            padding: 0 1.25rem 0.75rem;
            overflow-x: auto;
            scrollbar-width: none;
            mask-image: linear-gradient(to right, black 90%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, black 90%, transparent 100%);
        }

        .quick-actions::-webkit-scrollbar {
            display: none;
        }

        .action-chip {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-size: 0.85rem;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .action-chip:active {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(0.98);
        }

        .action-chip:hover {
            border-color: rgba(255, 255, 255, 0.2);
            color: var(--text-main);
        }
    </style>
</head>

<body>
    <header>
        <div class="header-title">
            <span class="status-dot"></span>
            Studio AI
        </div>
        <div style="font-size: 0.8rem; color: var(--text-muted);">
            v1.1
        </div>
    </header>

    <div id="chat-container">
        <div class="message ai">
            Hello! I'm your Studio OS assistant. How can I help you today?
        </div>
        <!-- Messages will be appended here -->
    </div>

    <div class="typing-indicator" id="typing-indicator">
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <div class="quick-actions">
        <div class="action-chip" onclick="fillInput('Status check')">Status</div>
        <div class="action-chip" onclick="fillInput('Generate post about ')">New Post</div>
        <div class="action-chip" onclick="fillInput('Publish site')">Publish</div>
        <div class="action-chip" onclick="fillInput('Help')">Help</div>
    </div>

    <div class="input-area">
        <input type="text" id="message-input" placeholder="Type a command..." autocomplete="off">
        <button id="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
            </svg>
        </button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const typingIndicator = document.getElementById('typing-indicator');

        // Handle Enter key
        messageInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        function fillInput(text) {
            messageInput.value = text;
            messageInput.focus();
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTyping() {
            typingIndicator.style.display = 'flex';
            chatContainer.appendChild(typingIndicator); // Move to bottom
            scrollToBottom();
        }

        function hideTyping() {
            typingIndicator.style.display = 'none';
        }

        function appendMessage(text, type, isHtml = false) {
            const div = document.createElement('div');
            div.className = `message ${type}`;

            if (isHtml) {
                div.innerHTML = text;
            } else {
                div.textContent = text;
            }

            // Insert before typing indicator if it exists
            if (typingIndicator.parentNode === chatContainer) {
                chatContainer.insertBefore(div, typingIndicator);
            } else {
                chatContainer.appendChild(div);
            }

            scrollToBottom();
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            // Clear input
            messageInput.value = '';

            // Show user message
            appendMessage(text, 'user');
            showTyping();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                hideTyping();

                if (data.status === 'success') {
                    const result = data.result;
                    let displayMsg = result.message || ''; // The conversational AI response

                    // Append structured data if available
                    const info = result.data || {};

                    if (info.preview) {
                        displayMsg += `<br><br><b>Preview:</b><br><i>${info.preview}</i>`;
                    }

                    if (info.filename) {
                        displayMsg += `<br><small>Saved to: ${info.filename}</small>`;
                    }

                    if (info.server_status) {
                        displayMsg += `<br><br><b>System Status:</b> ${info.server_status}`;
                        if (info.team_status) {
                            displayMsg += `<br><small>Active Goals: ${info.team_status.active_goals}</small>`;
                        }
                    }

                    if (info.status) {
                        displayMsg += `<br><br><i>${info.status}</i>`;
                    }

                    if (!displayMsg && result.action) {
                        displayMsg = `Action '${result.action}' executed.`;
                    }

                    appendMessage(displayMsg, 'ai', true);
                } else {
                    appendMessage('Error: ' + (data.message || 'Unknown error'), 'ai');
                }

            } catch (e) {
                hideTyping();
                appendMessage('Network error. Please try again.', 'ai');
                console.error(e);
            }
        }

        // Initial scroll
        scrollToBottom();
    </script>
</body>

</html>
