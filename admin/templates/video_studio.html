<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Studio - Studio OS</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #111;
            color: #eee;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body class="min-h-screen p-8">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1
                    class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400">
                    Video Studio</h1>
                <p class="text-gray-400 mt-1">AI-Powered Content Repurposing</p>
            </div>
            <a href="/" class="text-gray-400 hover:text-white transition-colors">Back to Dashboard</a>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="video-grid">
            <!-- Video Cards will be injected here -->
            <div class="col-span-full text-center py-12 text-gray-500">
                Loading videos...
            </div>
        </div>
    </div>

    <script>
        async function loadVideos() {
            try {
                const response = await fetch('/api/videos');
                const data = await response.json();
                const grid = document.getElementById('video-grid');
                grid.innerHTML = '';

                if (data.videos.length === 0) {
                    grid.innerHTML = '<div class="col-span-full text-center py-12 text-gray-500">No videos found. Publish a post to generate one!</div>';
                    return;
                }

                data.videos.forEach(video => {
                    const card = document.createElement('div');
                    card.className = 'glass-panel rounded-xl overflow-hidden flex flex-col';

                    let mediaContent = '';
                    if (video.video_exists) {
                        mediaContent = `
                            <video controls class="w-full aspect-[9/16] object-cover bg-black">
                                <source src="${video.video_url}" type="video/mp4">
                                Your browser does not support the video tag.
                            </video>
                        `;
                    } else {
                        mediaContent = `
                            <div class="w-full aspect-[9/16] bg-gray-900 flex items-center justify-center text-gray-600">
                                No Video Generated
                            </div>
                        `;
                    }

                    card.innerHTML = `
                        ${mediaContent}
                        <div class="p-4 flex-1 flex flex-col">
                            <h3 class="font-semibold text-lg mb-1 truncate" title="${video.title}">${video.title}</h3>
                            <p class="text-xs text-gray-400 mb-4">${video.date}</p>
                            
                            <div class="mt-auto space-y-2">
                                <div class="flex gap-2 mb-2">
                                    <select id="vibe-${video.slug}" class="bg-gray-800 text-xs rounded px-2 py-1 border border-gray-700 flex-1">
                                        <option value="chill">Chill (Default)</option>
                                        <option value="upbeat">Upbeat (Fast)</option>
                                        <option value="tech">Tech (Medium)</option>
                                    </select>
                                </div>
                                <button onclick="regenerateVideo('${video.slug}')" class="w-full py-2 px-4 rounded bg-gray-800 hover:bg-gray-700 text-sm transition-colors flex items-center justify-center gap-2">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                                    Regenerate (AI)
                                </button>
                                <button onclick="uploadVideo('${video.slug}')" class="w-full py-2 px-4 rounded btn-primary text-sm transition-colors flex items-center justify-center gap-2">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                                    Upload to TikTok
                                </button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error('Error loading videos:', error);
            }
        }

        async function regenerateVideo(slug) {
            if (!confirm('Are you sure you want to regenerate this video? This will overwrite the existing one.')) return;

            const vibe = document.getElementById(`vibe-${slug}`).value;
            const btn = event.target.closest('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Generating...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/videos/regenerate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ slug: slug, vibe: vibe })
                });
                const result = await response.json();
                if (result.status === 'success') {
                    alert('Video regenerated successfully!');
                    loadVideos(); // Reload grid
                } else {
                    alert('Error: ' + result.message);
                }
            } catch (error) {
                alert('Error regenerating video');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        async function uploadVideo(slug) {
            if (!confirm('Ready to upload to TikTok?')) return;

            const btn = event.target.closest('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Uploading...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/videos/upload', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ slug: slug })
                });
                const result = await response.json();
                if (result.status === 'success') {
                    alert('Video uploaded successfully!');
                } else {
                    alert('Error: ' + result.message);
                }
            } catch (error) {
                alert('Error uploading video');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // Load on start
        loadVideos();
    </script>
</body>

</html>
