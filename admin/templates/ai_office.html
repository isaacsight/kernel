<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio HQ | AI Workspace</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0f;
            --bg-floor: #141419;
            --wall: #2a2a35;
            --highlight: #4285f4;
            --neon: #00ff9d;

            --text-main: #e8eaed;
            --text-muted: #9aa0a6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 15, 0.9);
            z-index: 100;
        }

        .office-container {
            flex: 1;
            position: relative;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            background-color: var(--bg-floor);
            perspective: 1000px;
            overflow: hidden;
        }

        /* --- ZONES --- */
        .zone {
            position: absolute;
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 1rem;
            transition: all 0.3s;
        }

        .zone-label {
            position: absolute;
            top: -15px;
            left: 20px;
            background: var(--bg-deep);
            padding: 0 10px;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Desks Zone */
        .desks-area {
            top: 50px;
            left: 50px;
            width: 300px;
            bottom: 50px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            border: none;
            /* Invisible container */
        }

        .desk {
            background: rgba(40, 40, 50, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem;
            height: 140px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            transition: transform 0.3s;
        }

        .desk:hover {
            transform: translateX(10px);
            border-color: var(--highlight);
        }

        .desk-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.8rem;
        }

        .avatar {
            font-size: 1.5rem;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            display: grid;
            place-items: center;
        }

        .monitor {
            flex: 1;
            background: #000;
            border-radius: 4px;
            padding: 0.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--neon);
            overflow: hidden;
            border: 1px solid #333;
            position: relative;
        }

        .monitor::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* Whiteboard Zone */
        .whiteboard-area {
            top: 50px;
            left: 400px;
            right: 400px;
            bottom: 50px;
            background: #e8eaed;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            padding: 2rem;
            color: #222;
            position: relative;
            overflow: hidden;
        }

        .whiteboard-area::before {
            content: 'WHITEBOARD';
            position: absolute;
            top: 1rem;
            left: 1rem;
            font-weight: 800;
            opacity: 0.1;
            font-size: 2rem;
            letter-spacing: 0.2rem;
        }

        .sticky-note {
            width: 150px;
            height: 150px;
            background: #fff740;
            /* Post-it yellow */
            padding: 1rem;
            font-family: 'Komika Axis', cursive;
            /* Or just sans */
            font-size: 0.9rem;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
            position: absolute;
            transform: rotate(-2deg);
            transition: transform 0.2s;
            cursor: move;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .sticky-note:nth-child(even) {
            transform: rotate(2deg);
            background: #7afcff;
            /* Blue */
        }

        .sticky-note:nth-child(3n) {
            background: #ff7eb9;
            /* Pink */
        }

        .sticky-note:hover {
            transform: scale(1.1) rotate(0deg);
            z-index: 10;
        }

        .sticky-footer {
            font-size: 0.7rem;
            opacity: 0.6;
            text-align: right;
        }

        /* Meeting/Social Zone */
        .meeting-area {
            top: 50px;
            right: 50px;
            width: 300px;
            bottom: 50px;
            background: rgba(20, 20, 25, 0.5);
        }

        .chat-bubbles {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            height: 100%;
            overflow-y: auto;
            padding-top: 1rem;
        }

        .bubble {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.8rem;
            border-radius: 12px;
            font-size: 0.85rem;
            line-height: 1.4;
            max-width: 90%;
            align-self: flex-start;
        }

        .bubble.right {
            align-self: flex-end;
            background: rgba(66, 133, 244, 0.2);
            border: 1px solid rgba(66, 133, 244, 0.3);
        }
    </style>
</head>

<body>
    <header>
        <div style="font-weight: 800; font-size: 1.2rem; display: flex; align-items: center; gap: 0.5rem;">
            <span>🏢</span> Studio HQ
        </div>
        <div style="font-size: 0.8rem; color: var(--text-muted);">
            <span id="active-count">0</span> Agents Online
        </div>
    </header>

    <div class="office-container">
        <!-- Desks -->
        <div class="zone desks-area" id="desks-container">
            <!-- Injected via JS -->
        </div>

        <!-- Whiteboard -->
        <div class="zone whiteboard-area" id="whiteboard">
            <!-- Stickies Injected via JS -->
            <div style="position: absolute; bottom: 20px; right: 20px;">
                <button onclick="addSticky()"
                    style="padding: 10px 20px; background: #222; color: #fff; border:none; cursor: pointer; border-radius: 4px;">+
                    Add Idea</button>
            </div>
        </div>

        <!-- Meeting Room -->
        <div class="zone meeting-area">
            <div class="zone-label">Meeting Room</div>
            <div class="chat-bubbles" id="meeting-chat">
                <!-- Injected via JS -->
            </div>
        </div>
    </div>

    <script>
        // State
        let officeState = null;

        async function loop() {
            try {
                const res = await fetch('/api/office/state');
                const data = await res.json();

                if (data.status === 'success') {
                    renderOffice(data.state);
                }
            } catch (e) {
                console.error("Sync failed:", e);
            }
        }

        function renderOffice(state) {
            officeState = state;
            document.getElementById('active-count').innerText = Object.keys(state.agents).length;

            renderDesks(state.agents, state.personas);
            renderWhiteboard(state.whiteboard);
            // We could render meeting room chat from social feed if we fetch it separately
        }

        function renderDesks(agents, personas) {
            const container = document.getElementById('desks-container');
            container.innerHTML = Object.entries(agents).map(([name, data]) => {
                const persona = personas[name];
                return `
                <div class="desk">
                    <div class="desk-header">
                        <div class="avatar" style="background: ${persona.color}30;">${persona.avatar}</div>
                        <div>
                            <div style="font-weight: 700; font-size: 0.9rem;">${name}</div>
                            <div style="font-size: 0.7rem; color: var(--text-muted);">${data.status} • ${data.location}</div>
                        </div>
                    </div>
                    <div class="monitor">
                        > ${data.current_task}
                        <span class="cursor">_</span>
                    </div>
                </div>
                `;
            }).join('');
        }

        function renderWhiteboard(items) {
            const container = document.getElementById('whiteboard');
            // Keep the button
            const buttonHtml = container.querySelector('button').parentElement.outerHTML;

            const itemsHtml = items.map((item, index) => {
                // Randomize positions slightly if not set (simple scatter)
                const left = (index * 40) % 300 + 50;
                const top = (index * 40) % 300 + 50;

                return `
                <div class="sticky-note" style="top: ${top}px; left: ${left}px;">
                    <div>${item.content}</div>
                    <div class="sticky-footer">- ${item.author}</div>
                </div>
                `;
            }).join('');

            container.innerHTML = itemsHtml + buttonHtml;
        }

        async function addSticky() {
            const idea = prompt("New Idea:");
            if (!idea) return;

            await fetch('/api/office/whiteboard', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'add',
                    content: idea,
                    author: 'User'
                })
            });
            loop(); // Refresh immediately
        }

        // Boot
        loop();
        setInterval(loop, 2000); // 2s refresh for "Live" feel

        // Fetch logs for meeting room
        async function loadChat() {
            const res = await fetch('/api/social/feed');
            const data = await res.json();
            const container = document.getElementById('meeting-chat');
            container.innerHTML = data.feed.map(p => `
                <div class="bubble ${p.author === 'User' ? 'right' : ''}">
                    <div style="font-weight: 700; font-size: 0.7rem; margin-bottom: 0.2rem; color: ${p.author_color};">${p.author}</div>
                    ${p.content}
                </div>
            `).join('');
        }
        loadChat();
        setInterval(loadChat, 5000);

    </script>
</body>

</html>
