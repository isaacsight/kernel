<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Mobile Checkpoint</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            font-size: 24px;
            font-weight: 300;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        .status {
            font-size: 12px;
            color: #666;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #333;
            border-radius: 50%;
            display: inline-block;
        }

        .dot.online {
            background-color: #0f0;
            box-shadow: 0 0 10px #0f0;
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            background: #111;
        }

        .message {
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .message.user {
            color: #aaa;
            text-align: right;
        }

        .message.system {
            color: #fff;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background: #222;
            color: white;
            font-size: 16px;
            outline: none;
        }

        button {
            background: #fff;
            color: #000;
            border: none;
            padding: 0 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body>
    <h1>DTFR System <span style="color:#666">Mobile</span></h1>
    <div class="status">
        <span><span class="dot online"></span> Windows Node</span>
        <span><span class="dot" id="mac-status"></span> Mac Controller</span>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('command')">Command</div>
        <div class="tab" onclick="switchTab('terminal')">Terminal Log</div>
    </div>

    <div id="command-view">
        <div id="chat-box">
            <div class="message system">System online. Connected to Windows Node. Ready to command Mac.</div>
        </div>

        <div class="controls">
            <input type="text" id="input" placeholder="Comman the system..." autocomplete="off">
            <button onclick="sendCommand()">Send</button>
        </div>
    </div>

    <div id="terminal-view" style="display: none;">
        <div id="terminal-box">
            <div class="log-line">Connecting to log stream...</div>
        </div>
    </div>

    <style>
        .tabs {
            display: flex;
            margin-bottom: 10px;
            border-bottom: 1px solid #333;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            color: #666;
        }

        .tab.active {
            color: #fff;
            border-bottom: 2px solid #fff;
        }

        #terminal-box {
            background: #0d0d0d;
            font-family: 'Courier New', monospace;
            padding: 10px;
            border-radius: 8px;
            height: 60vh;
            overflow-y: auto;
            font-size: 11px;
            color: #0f0;
        }

        .log-line {
            margin-bottom: 4px;
            white-space: pre-wrap;
            word-break: break-all;
        }
    </style>

    <script>
        const input = document.getElementById('input');
        const chatBox = document.getElementById('chat-box');
        const terminalBox = document.getElementById('terminal-box');
        const API_BASE = window.location.origin;

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            if (tab === 'command') {
                document.getElementById('command-view').style.display = 'block';
                document.getElementById('terminal-view').style.display = 'none';
            } else {
                document.getElementById('command-view').style.display = 'none';
                document.getElementById('terminal-view').style.display = 'block';
                fetchLogs(); // Trigger immediate fetch
            }
        }

        async function sendCommand() {
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';

            try {
                const res = await fetch(`${API_BASE}/relay`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: text })
                });

                const data = await res.json();

                if (data.success) {
                    addMessage(`✅ ${data.message || 'Executed'}`, 'system');
                    if (data.data && data.data.preview) {
                        addMessage(`📝 ${data.data.preview}`, 'system');
                    }
                } else {
                    addMessage(`❌ ${data.error || data.message || 'Failed'}`, 'system');
                }

            } catch (e) {
                addMessage(`⚠️ Connection Error: ${e.message}`, 'system');
            }
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendCommand();
        });

        async function fetchLogs() {
            if (document.getElementById('terminal-view').style.display === 'none') return;
            try {
                const res = await fetch(`${API_BASE}/relay/logs`);
                const data = await res.json();
                if (data.logs) {
                    terminalBox.innerHTML = data.logs.map(line => `<div class="log-line">${line}</div>`).join('');
                    terminalBox.scrollTop = terminalBox.scrollHeight;
                }
            } catch (e) {
                console.error("Log fetch failed", e);
            }
        }

        // Check Mac Status via Windows
        async function checkStatus() {
            try {
                const res = await fetch(`${API_BASE}/relay/health`);
                const data = await res.json();
                document.getElementById('mac-status').className = data.mac_online ? 'dot online' : 'dot';
            } catch (e) { }
        }

        setInterval(checkStatus, 5000);
        setInterval(fetchLogs, 2000); // Poll logs every 2s
        checkStatus();
    </script>
</body>

</html>
