{% extends "base.html" %}

{% block content %}
<div class="dashboard-wrapper">
    <!-- Header / Status -->
    <!-- Desktop/Mobile Top Nav -->
    <div class="dashboard-top-nav flex items-center justify-between mb-8">
        <div class="brand-info">
            <h1 class="text-2xl font-bold" style="color: var(--color-void);">System Compiler</h1>
            <p class="text-sm" style="color: var(--color-slate);">v2.1.0-alpha • OSS Native Runtime • Phase 1: HARNESS
            </p>
        </div>
        <a href="https://github.com/isaacsight/does-this-feel-right-" target="_blank"
            class="badge badge--link py-2 px-4 rounded-full border flex items-center gap-2"
            style="border-color: var(--color-border); color: var(--color-slate);" rel="noopener">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" class="w-4 h-4">
                <path
                    d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22">
                </path>
            </svg>
            <span class="font-mono text-xs">REPOSTITORY_TRACE</span>
        </a>
    </div>

    <div class="dashboard-grid">
        <!-- DTFR Hero Section -->
        <section class="mb-12 full-width">
            <dtfr-hero data-variant="default"></dtfr-hero>
        </section>

        <!-- Builder Cockpit (Phase 4) -->
        <section class="dashboard-card full-width mb-12"
            style="border-top: 1px solid var(--color-border); padding-top: var(--space-8);">
            <h2 class="text-3xl font-bold mb-8"
                style="font-family: var(--font-display); font-style: italic; color: var(--color-void);">Inquiry Cockpit
            </h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <dtfr-console></dtfr-console>
                <dtfr-stack data-editable="true"></dtfr-stack>
            </div>
        </section>

        <!-- Activity Feeds (Phase 3) -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 full-width mb-12">
            <!-- Latest Runs -->
            <dtfr-feed data-type="runs"></dtfr-feed>

            <!-- Dynamic Trails -->
            <dtfr-feed data-type="patterns"></dtfr-feed>
        </div>

        <!-- Decision Log (Phase 3) -->
        <section class="full-width mb-12">
            <dtfr-feed data-type="log" data-limit="3"></dtfr-feed>
        </section>


        <!-- Visitor Notes Section -->
        <section class="dashboard-card full-width notes-section mt-12"
            style="border-top: 1px solid var(--color-border); padding-top: var(--space-8);">
            <h2 class="text-2xl font-bold mb-6" style="color: var(--color-void);">
                <span class="status-pulse ai"></span>
                Visitor Ledger
            </h2>
            <p style="color: var(--color-slate);" class="mb-6">Record a trace — persistent context for the system.</p>

            <!-- Note Form -->
            <form id="note-form" class="note-form mb-8">
                <div class="note-form-row">
                    <input type="text" id="note-name" placeholder="Name (optional)" maxlength="50"
                        class="note-input note-input-name">
                    <textarea id="note-message" placeholder="Write something..." maxlength="280" rows="2" required
                        class="note-input note-input-message"></textarea>
                </div>
                <div class="note-form-footer">
                    <span class="note-char-count text-zinc-500 text-sm"></span>
                    <button type="submit" class="note-submit-btn">Leave a Note</button>
                </div>
            </form>

            <!-- Notes Display -->
            <div id="notes-list" class="notes-list">
                <p class="note-empty">Loading notes...</p>
            </div>
        </section>
    </div>
</div>
{% endblock %}
