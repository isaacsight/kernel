<section class="graph">
    <div class="graph__header">
        <h1>Map</h1>
        <p class="muted">A living map of ideas, essays, and questions — explore how thoughts connect.</p>
        <!-- Controls moved inside graph__wrap for overlay -->
    </div>

    <div class="graph__wrap">
        <canvas id="graphCanvas" width="1200" height="720"></canvas>

        <!-- Center Hint -->
        <div id="graphCenterHint" class="graph__center-hint">
            <div class="hint-content">
                <p>Click a node to explore.</p>
            </div>
        </div>

        <!-- Top Left: Consolidated Glass Pill -->
        <div class="graph__glass-pill">
            <!-- Find -->
            <div class="graph__control-group">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    class="muted">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input id="graphFilter" class="graph__input" type="search" placeholder="Search..." autocomplete="off" />
            </div>

            <div class="vr"></div>

            <!-- Filter -->
            <div class="graph__control-group">
                <label class="graph__toggle" title="Show only Core Essays">
                    <input id="graphCanonOnly" type="checkbox" />
                    <span>Core only</span>
                </label>

                <select id="graphDirection" class="graph__select" aria-label="Link Direction"
                    title="Filter links by direction">
                    <option value="all">All links</option>
                    <option value="out">References</option>
                    <option value="in">Referenced by</option>
                </select>
            </div>

            <div class="vr"></div>

            <!-- Actions -->
            <div class="graph__control-group">
                <button id="graphReset" class="btn-icon-plain" title="Reset Camera">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                        <path d="M3 3v5h5" />
                    </svg>
                </button>
                <a href="./index.html" class="btn-text" title="Switch to List View">List</a>
            </div>
        </div>
        <!-- Right Side: Persistent Inspector -->
        <div id="graphInspector" class="graph__sidebar"></div>

    </div>

    <!-- Loading Overlay -->
    <div id="graphLoading" class="graph__loading">
        <div class="spinner"></div>
    </div>
</section>

<script src="../static/js/graph.js?v=fixed3"></script>
